models:
  embedding: nomic-embed-text:latest
  llm:
    type: local
    model: qwen3:8b
    google_model: gemini-2.5-flash
    max_allowed_tokens: 8192
chunking:
  size: 500
  overlap: 100
  mode: tokens
  strategy: fixed
retrieval:
  top_k: 10
citations:
  unique_id_format: '{author}{title_words}{year}'
