models:
  embedding: nomic-embed-text:latest
  llm:
    type: anthropic
    model: gemma4:e2b
    google_model: gemini-2.5-flash
    anthropic_model: claude-opus-4-6
chunking:
  size: 500
  overlap: 100
  mode: tokens
  strategy: fixed
retrieval:
  top_k: 10
citations:
  unique_id_format: '{author}{title_words}{year}'
