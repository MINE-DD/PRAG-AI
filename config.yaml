models:
  embedding: mxbai-embed-large:latest
  llm:
    type: local
    model: gemma4:e2b
    google_model: gemini-2.5-flash
    max_allowed_tokens: 131072
chunking:
  size: 500
  overlap: 100
  mode: tokens
  strategy: fixed
retrieval:
  top_k: 10
citations:
  unique_id_format: '{author}{title_words}{year}'
